options:
  logging: CLOUD_LOGGING_ONLY

steps:
# ------------------- Backend Build -------------------
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-f','backend/docker/node/Dockerfile.production',
      '-t','gcr.io/$PROJECT_ID/backend:$COMMIT_SHA',
      'backend'
    ]

# ------------------- Frontend Build -------------------
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '--build-arg','VITE_API_URL=${_VITE_API_URL}',
      '--build-arg','VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}',
      '--build-arg','VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}',
      '-t','gcr.io/$PROJECT_ID/frontend:$COMMIT_SHA',
      'frontend'
    ]

# ------------------- Push -------------------
- name: 'gcr.io/cloud-builders/docker'
  args: ['push','gcr.io/$PROJECT_ID/backend:$COMMIT_SHA']

- name: 'gcr.io/cloud-builders/docker'
  args: ['push','gcr.io/$PROJECT_ID/frontend:$COMMIT_SHA']

# ------------------- Backend Deploy -------------------
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  args:
    [
      'gcloud','run','deploy','backend-node',
      '--image','gcr.io/$PROJECT_ID/backend:$COMMIT_SHA',
      '--region','asia-northeast1',
      '--platform','managed',
      '--allow-unauthenticated',
      '--set-env-vars',
      'SUPABASE_URL=${_SUPABASE_URL},SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY},FRONTEND_URL=${_FRONTEND_URL},NODE_ENV=production',
      '--update-secrets',
      'POSTGRES_PASSWORD=POSTGRES_PASSWORD:latest, DB_HOST=DB_HOST:latest'
    ]

# ------------------- Frontend Deploy -------------------
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  args:
    [
      'gcloud','run','deploy','frontend',
      '--image','gcr.io/$PROJECT_ID/frontend:$COMMIT_SHA',
      '--region','asia-northeast1',
      '--platform','managed',
      '--allow-unauthenticated'
    ]

images:
- gcr.io/$PROJECT_ID/backend:$COMMIT_SHA
- gcr.io/$PROJECT_ID/frontend:$COMMIT_SHA